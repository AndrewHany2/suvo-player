name: CI

# Runs the fast node:test suite on every push and PR so regressions are caught
# during development — the release workflow only fires on tags.
on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      # Coverage is reported for visibility, not gated: Node 20 has no
      # --test-coverage-* threshold flags (added in Node 22). Revisit as a hard
      # gate when the runtime moves to 22+.
      - run: npm run test:coverage

  # Smoke-build the web + TV bundles so a broken metro .web→.tv swap regex, a
  # patch-index transpile failure, or an obfuscation error is caught on the PR
  # instead of only at release (the release workflow runs on tags). Both targets
  # are pure JS — no native (Android/iOS/Electron) toolchain required.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:web
      - run: npm run build:tv

  # The reseller dashboard is a standalone Vite/TS app with its own lockfile and
  # test suite (auth-gating, API, payload/format logic). It's security-sensitive
  # and was previously in no workflow — typecheck (tsc -b via build) + vitest so
  # a break there is caught on the PR, not in production.
  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
